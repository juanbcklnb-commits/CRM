<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Datos - LNB SGC</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f6f9; color: #333; }
        h1 { color: #1a365d; border-bottom: 2px solid #1a365d; padding-bottom: 10px; }
        .table-container { overflow-x: auto; margin-top: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #2b6cb0; color: white; font-weight: bold; }
        tr:hover { background-color: #f7fafc; }
        #mensaje { font-weight: bold; color: #4a5568; }
    </style>
</head>
<body>

    <h1>Sistema de Gestión Controlada (SGC) - Datos de Inventario y Presupuesto</h1>
    <div id="mensaje">Cargando información desde Google Sheets...</div>

    <div class="table-container">
        <table id="tabla-datos">
            <thead>
                <tr id="encabezados"></tr>
            </thead>
            <tbody id="cuerpo-tabla"></tbody>
        </table>
    </div>

    <script>
        // CORREGIDO: URL en una sola línea continua y sin espacios
        const urlCSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQWmXFEoqpd7NT9tJKpvLVoD8C3cd-t-Ub2CIsSxt_23ppOHnKDjcwKrKykRndwOkOrE5p0p1xX8tNV/pub?gid=1451749554&single=true&output=csv';

        function cargarDatos() {
            Papa.parse(urlCSV, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(resultado) {
                    const datos = resultado.data;
                    const columnas = resultado.meta.fields;
                    
                    if (datos.length === 0) {
                        document.getElementById('mensaje').innerText = "No se encontraron datos en el archivo.";
                        return;
                    }

                    const filaEncabezados = document.getElementById('encabezados');
                    columnas.forEach(columna => {
                        const th = document.createElement('th');
                        th.innerText = columna;
                        filaEncabezados.appendChild(th);
                    });

                    const cuerpoTabla = document.getElementById('cuerpo-tabla');
                    datos.forEach(fila => {
                        const tr = document.createElement('tr');
                        columnas.forEach(columna => {
                            const td = document.createElement('td');
                            td.innerText = fila[columna] || '';
                            tr.appendChild(td);
                        });
                        cuerpoTabla.appendChild(tr);
                    });

                    document.getElementById('mensaje').style.display = 'none';
                },
                error: function(err) {
                    document.getElementById('mensaje').innerText = "Error al conectar con Google Sheets. Verifica la publicación.";
                    console.error(err);
                }
            });
        }

        window.addEventListener('DOMContentLoaded', cargarDatos);
    </script>
</body>
</html>
