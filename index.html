<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Compras — LNB 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --navy: #0f1f3d;
  --navy-mid: #1a3260;
  --navy-light: #2a4a8a;
  --navy-pale: #d6e4f7;
  --navy-ghost: #eef4fc;
  --slate: #4a6080;
  --slate-light: #8aa0bb;
  --silver: #c8d6e8;
  --bg: #f0f4fa;
  --surface: #ffffff;
  --surface2: #f7fafd;
  --text: #0f1f3d;
  --text-mid: #4a6080;
  --text-light: #8aa0bb;
  --border: #d6e4f7;
  --green: #1a7a4a;
  --green-bg: #e6f5ee;
  --amber: #a05a00;
  --amber-bg: #fff4e0;
  --red: #b03030;
  --red-bg: #fceaea;
  --blue-mid: #1a5ab8;
  --blue-bg: #e8f0fd;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  min-height: 100vh;
}

.page {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 24px 64px;
}

/* ── Header ── */
.topbar {
  background: var(--navy);
  padding: 0 24px;
  margin: 0 -24px 32px;
  display: flex;
  align-items: stretch;
  justify-content: space-between;
  gap: 24px;
  flex-wrap: wrap;
}

.topbar-brand {
  padding: 20px 0;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.topbar-brand .org {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--navy-pale);
  opacity: 0.7;
}

.topbar-brand h1 {
  font-size: 18px;
  font-weight: 600;
  color: #ffffff;
  letter-spacing: -0.3px;
}

.topbar-brand h1 span {
  color: #7eb8f5;
}

.topbar-meta {
  display: flex;
  align-items: center;
  gap: 20px;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 11px;
  color: rgba(255,255,255,0.8);
  font-family: 'DM Mono', monospace;
}

.live-dot {
  width: 6px;
  height: 6px;
  background: #4ade80;
  border-radius: 50%;
  animation: blink 2s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.refresh-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px;
  color: rgba(255,255,255,0.85);
  padding: 6px 14px;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: background 0.15s;
}

.refresh-btn:hover { background: rgba(255,255,255,0.18); }
.refresh-btn svg { width: 13px; height: 13px; }

/* ── KPI Row ── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 12px;
  margin-bottom: 28px;
}

.kpi {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}

.kpi::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}

.kpi.k-navy::before  { background: var(--navy); }
.kpi.k-blue::before  { background: #378add; }
.kpi.k-green::before { background: #1a7a4a; }
.kpi.k-amber::before { background: #d97a00; }
.kpi.k-red::before   { background: #b03030; }

.kpi-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--text-light);
  margin-bottom: 8px;
}

.kpi-value {
  font-size: 28px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.5px;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}

.kpi-sub {
  font-size: 11px;
  color: var(--text-light);
  margin-top: 5px;
  font-family: 'DM Mono', monospace;
}

/* ── Section label ── */
.sec-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.6px;
  text-transform: uppercase;
  color: var(--slate);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.sec-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Charts row ── */
.charts-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1.4fr;
  gap: 14px;
  margin-bottom: 28px;
}

@media (max-width: 900px) {
  .charts-row { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 600px) {
  .charts-row { grid-template-columns: 1fr; }
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
}

.card-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--text-light);
  margin-bottom: 14px;
}

.chart-wrap {
  position: relative;
}

/* ── Legend ── */
.chart-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 14px;
  margin-top: 12px;
}

.leg-item {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text-mid);
}

.leg-swatch {
  width: 9px;
  height: 9px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ── Table ── */
.table-section { margin-bottom: 28px; }

.tbl-filters {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
  align-items: center;
}

.filter-select, .search-input {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  font-family: 'Inter', sans-serif;
  color: var(--text);
  outline: none;
}

.filter-select:focus, .search-input:focus {
  border-color: var(--navy-light);
}

.search-input { width: 220px; }

.tbl-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}

.tbl-scroll { overflow-x: auto; }

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}

thead th {
  background: var(--navy);
  color: rgba(255,255,255,0.85);
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.2px;
  text-transform: uppercase;
  padding: 10px 14px;
  text-align: left;
  white-space: nowrap;
}

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}

tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--navy-ghost); }

tbody td {
  padding: 10px 14px;
  color: var(--text);
  vertical-align: middle;
}

.mono { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--slate); }

.tag {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.tag-green  { background: var(--green-bg);  color: var(--green); }
.tag-amber  { background: var(--amber-bg);  color: var(--amber); }
.tag-red    { background: var(--red-bg);    color: var(--red); }
.tag-navy   { background: var(--navy-ghost); color: var(--navy-mid); }
.tag-blue   { background: var(--blue-bg);   color: var(--blue-mid); }

.amount { font-family: 'DM Mono', monospace; font-size: 12px; white-space: nowrap; }

/* ── Status bar ── */
.status-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-light);
  font-family: 'DM Mono', monospace;
}

/* ── Loading / Error ── */
.loading-overlay {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  gap: 14px;
  color: var(--text-mid);
}

.spinner {
  width: 28px;
  height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--navy);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-box {
  background: var(--red-bg);
  border: 1px solid #f0c0c0;
  border-radius: 8px;
  padding: 14px 18px;
  color: var(--red);
  font-size: 12px;
  margin-bottom: 16px;
}
</style>
</head>
<body>

<div class="page">

  <div class="topbar">
    <div class="topbar-brand">
      <div class="org">Lotería Nacional de Beneficencia</div>
      <h1>Dashboard <span>Compras & Proveeduría</span> · 2026</h1>
    </div>
    <div class="topbar-meta">
      <div class="live-badge">
        <div class="live-dot"></div>
        <span id="last-update">Cargando…</span>
      </div>
      <button class="refresh-btn" onclick="loadData()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        Actualizar
      </button>
    </div>
  </div>

  <div id="error-box" class="error-box" style="display:none;"></div>
  <div id="debug-cols" style="font-size:10px;font-family:'DM Mono',monospace;color:var(--text-light);margin-bottom:8px;word-break:break-all;display:none;"></div>

  <div class="sec-label">Indicadores generales</div>
  <div class="kpi-row" id="kpi-row">
    <div class="loading-overlay" style="grid-column:1/-1;padding:30px"><div class="spinner"></div><span style="font-size:12px;color:var(--text-light)">Conectando con Google Sheets…</span></div>

  <div class="charts-row" id="charts-row" style="display:none;">
    <div class="card">
      <div class="card-title">Por tipo de procedimiento</div>
      <div class="chart-wrap" style="height:180px"><canvas id="chartTipo"></canvas></div>
      <div class="chart-legend" id="leg-tipo"></div>
    </div>
    <div class="card">
      <div class="card-title">Por estado actual</div>
      <div class="chart-wrap" style="height:180px"><canvas id="chartEstado"></canvas></div>
      <div class="chart-legend" id="leg-estado"></div>
    </div>
    <div class="card">
      <div class="card-title">Precio referencia vs. adjudicado por unidad</div>
      <div class="chart-wrap" id="chart-unidad-wrap"><canvas id="chartUnidad"></canvas></div>
    </div>
  </div>

  <div class="table-section">
    <div class="sec-label">Registro de expedientes</div>
    <div class="tbl-filters">
      <input class="search-input" type="search" id="search-inp" placeholder="Buscar requisición, descripción, empresa…" oninput="renderTable()">
      <select class="filter-select" id="fil-tipo" onchange="renderTable()">
        <option value="">Todos los tipos</option>
      </select>
      <select class="filter-
